<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易理明灯 - AI命理助手</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #eee; height:100vh; display:flex; flex-direction:column; }
.header { background: #16213e; padding: 16px; text-align:center; border-bottom: 1px solid #0f3460; }
.header h1 { font-size: 20px; color: #e94560; }
.header p { font-size: 12px; color: #888; margin-top:4px; }
.chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.msg { max-width:85%; padding:12px 16px; border-radius:12px; line-height:1.6; font-size:14px; white-space:pre-wrap; word-break:break-word; }
.msg.user { align-self:flex-end; background:#e94560; color:#fff; }
.msg.bot { align-self:flex-start; background:#16213e; border:1px solid #0f3460; }
.input-box { display:flex; padding:12px; gap:8px; background:#16213e; border-top:1px solid #0f3460; }
.input-box input { flex:1; padding:12px; border:none; border-radius:8px; background:#1a1a2e; color:#eee; font-size:14px; outline:none; }
.input-box button { padding:12px 20px; border:none; border-radius:8px; background:#e94560; color:#fff; font-size:14px; cursor:pointer; }
.input-box button:disabled { opacity:0.5; }
.typing { align-self:flex-start; color:#888; font-size:12px; padding:8px; }
.hints { font-size:11px; color:#666; padding:4px 16px 8px; display:flex; gap:8px; flex-wrap:wrap; }
.hints span { background:#16213e; padding:4px 10px; border-radius:12px; cursor:pointer; }
.hints span:hover { background:#0f3460; }
</style>
</head>
<body>
<div class="header">
  <h1>🔮 易理明灯</h1>
  <p>AI命理助手 · 9大体系 · 古籍为据</p>
</div>
<div class="chat" id="chat">
  <div class="msg bot">👋 您好！我是易理明灯AI命理助手。

我能帮您分析：
🔹 八字命理 🔹 紫微斗数 🔹 易经占卜
🔹 风水堪舆 🔹 面相手相 🔹 择日通书
🔹 奇门遁甲 🔹 姓名学 🔹 合婚配对

💬 直接告诉我您想问什么！</div>
</div>
<div class="hints" id="hints">
  <span onclick="send(this.textContent)">帮我看八字 1990年5月20日 下午3点 北京 男</span>
  <span onclick="send(this.textContent)">我属马，今年运势怎么样</span>
  <span onclick="send(this.textContent)">帮我算个卦 这次投资能成吗</span>
  <span onclick="send(this.textContent)">找个搬家吉日</span>
</div>
<div class="input-box">
  <input id="input" placeholder="输入您的问题..." onkeydown="if(event.key==='Enter')send()" autofocus>
  <button id="btn" onclick="send()">发送</button>
</div>
<script>
const API = '/v1/chat/completions';
function add(msg, role) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = msg;
  document.getElementById('chat').appendChild(d);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}
function send(text) {
  const input = document.getElementById('input');
  const btn = document.getElementById('btn');
  const hints = document.getElementById('hints');
  const msg = text || input.value.trim();
  if (!msg) return;
  add(msg, 'user');
  if (!text) input.value = '';
  btn.disabled = true;
  hints.style.display = 'none';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.id = 'typing';
  typing.textContent = '🔮 正在分析中...';
  document.getElementById('chat').appendChild(typing);
  fetch(API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'fortune-agent',
      messages: [{role: 'user', content: msg}]
    })
  }).then(r => r.json()).then(d => {
    document.getElementById('typing')?.remove();
    const reply = d.choices?.[0]?.message?.content || '抱歉，服务暂时不可用';
    add(reply, 'bot');
    hints.style.display = 'flex';
  }).catch(e => {
    document.getElementById('typing')?.remove();
    add('⚠️ 网络错误，请稍后重试', 'bot');
  }).finally(() => btn.disabled = false);
}
</script>
</body>
</html>
